name: CodeQL
permissions:
    contents: read
    packages: read
    actions: read
    security-events: write
    
on:
  workflow_dispatch:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  analyze:
    uses: SilverPineSoftware/UUGithubActions/.github/workflows/uu_android_codeql.yml@main
    secrets:
      READ_PACKAGES_PAT: ${{ secrets.CI_READ_PACKAGES_GITHUB_TOKEN }}
